<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice Inbox · Вход</title>
  <style>
    :root {
      --bg: #111113;
      --card-bg: #1c1c1f;
      --text: #e0e0e0;
      --muted: #9292a0;
      --accent: #5b5bff;
      --accent-soft: rgba(91, 91, 255, 0.18);
      --danger: #ff6b7a;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(91, 91, 255, 0.22), transparent 35%),
        radial-gradient(circle at bottom left, rgba(255, 107, 122, 0.12), transparent 30%),
        var(--bg);
    }

    .panel {
      width: min(100%, 420px);
      padding: 32px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 100%), var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #c9c8ff;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 8vw, 42px);
      line-height: 0.95;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.55;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      font-size: 14px;
      color: var(--muted);
    }

    input[type="password"] {
      width: 100%;
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-size: 16px;
      outline: none;
    }

    input[type="password"]:focus {
      border-color: rgba(91, 91, 255, 0.55);
      box-shadow: 0 0 0 4px rgba(91, 91, 255, 0.16);
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 16px 18px;
      background: linear-gradient(135deg, #5b5bff, #7b7bff);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .error {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 107, 122, 0.12);
      border: 1px solid rgba(255, 107, 122, 0.28);
      color: #ffb9c0;
      font-size: 14px;
    }

    @media (max-width: 480px) {
      .panel {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="eyebrow">Voice Inbox</div>
    <h1>Вход в панель</h1>
    <p>Введите пароль, чтобы открыть ленту голосовых заметок и темы с транскрипциями.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('login') }}">
      <label for="password">Пароль</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Открыть Voice Inbox</button>
    </form>
  </main>
</body>
</html>
